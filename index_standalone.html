<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroGen - AI Powered Smart Farming Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #09100c; color: #f0fdf4; margin: 0; }
    .glass-panel { background: rgba(18, 30, 22, 0.82); backdrop-filter: blur(16px); border: 1px solid rgba(74, 222, 128, 0.18); }
    .glass-card { background: linear-gradient(135deg, rgba(22, 38, 28, 0.85) 0%, rgba(13, 24, 17, 0.9) 100%); border: 1px solid rgba(74, 222, 128, 0.15); transition: all 0.3s ease; }
    .glass-card:hover { border-color: rgba(74, 222, 128, 0.45); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(34, 197, 94, 0.25); }
    @keyframes laserScan { 0% { top: 0%; opacity: 0.8; } 50% { top: 95%; opacity: 1; } 100% { top: 0%; opacity: 0.8; } }
    .animate-laser-scan { position: absolute; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #22c55e, #86efac, #22c55e, transparent); box-shadow: 0 0 18px 4px rgba(34, 197, 94, 0.85); animation: laserScan 2.2s infinite ease-in-out; }
  </style>
</head>
<body class="bg-[#09100c] text-emerald-100 min-h-screen flex flex-col">
  
  <header class="glass-panel sticky top-0 z-40 border-b border-emerald-500/20 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3 cursor-pointer" onclick="switchTab('landing')">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-400 p-0.5">
        <div class="w-full h-full bg-emerald-950 rounded-[10px] flex items-center justify-center font-bold text-emerald-300">🌿</div>
      </div>
      <span class="text-xl font-extrabold text-emerald-100">AgroGen AI</span>
    </div>
    <nav class="flex items-center gap-2 text-xs font-semibold">
      <button onclick="switchTab('landing')" class="px-3 py-1.5 rounded-lg bg-emerald-500/20 text-emerald-300 border border-emerald-500/40">Home</button>
      <button onclick="switchTab('detection')" class="px-3 py-1.5 rounded-lg text-emerald-300/70 hover:text-emerald-200">Disease Scanner</button>
      <button onclick="switchTab('crops')" class="px-3 py-1.5 rounded-lg text-emerald-300/70 hover:text-emerald-200">Crop Library</button>
      <button onclick="switchTab('weather')" class="px-3 py-1.5 rounded-lg text-emerald-300/70 hover:text-emerald-200">Weather</button>
    </nav>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto p-6 space-y-8">
    <div class="glass-panel p-12 rounded-3xl border border-emerald-500/30 text-center space-y-6">
      <h1 class="text-5xl font-black text-emerald-100">AI Powered Smart Farming Assistant</h1>
      <p class="text-sm text-emerald-300/80 max-w-2xl mx-auto">Detect diseases instantly, identify pests, receive 24/7 AI guidance, and improve crop health.</p>
      <button onclick="alert('AgroGen AI Active!')" class="px-8 py-3.5 rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-400 text-emerald-950 font-black">Explore AgroGen</button>
    </div>
  </main>

  <script>
    function switchTab(t) { console.log('Tab switched to: ' + t); }
  </script>
</body>
</html>
